name: build_and_test

env:
  RUST_VERSION: 1.94.1

on:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-1

      - name: Install Just command runner
        uses: extractions/setup-just@v3

      - name: install ic-wasm
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/dfinity/ic-wasm/releases/download/0.9.11/ic-wasm-installer.sh | sh

      - name: install candid-extractor
        run: |
          wget https://github.com/dfinity/candid-extractor/releases/download/0.1.6/candid-extractor-x86_64-unknown-linux-gnu.tar.gz -O /tmp/candid-extractor-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf /tmp/candid-extractor-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/candid-extractor

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: check rust code format
        run: |
          just fmt_nightly "--check"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: $RUST_VERSION
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      - name: Install Rust (wasm32-unknown-unknown target)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: $RUST_VERSION
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: build canisters
        run: |
          just build_all

      - name: check rust code style
        run: |
          just check_code

      - name: test
        run: |
          just test_all

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests
        run: |
          cargo llvm-cov \
            --no-fail-fast \
            --workspace \
            --lib \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex '.*(integration-tests).*' \
            --exclude "integration-tests" \
            --exclude-from-report "integration-tests"
      - name: Coveralls
        continue-on-error: true
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          # currently we only run one coverage report per build
          parallel: false
