[workspace]
members = [
  "integration-tests",
  "src/did",
  "src/directory",
  "src/federation",
  "src/pocket-test",
  "src/user",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.85"
repository = "https://github.com/veeso/mastic"

[workspace.dependencies]
candid = { version = "0.10", features = ["value"] }
ic-cdk = "0.18"
ic-cdk-macros = "0.18"
ic-stable-structures = "0.6.8"
serde = "1"
serde_bytes = "0.11"

# integration-tests
anyhow = "1"
candid_parser = "0.2.0-beta.4"
flate2 = "1"
git2 = "0.20"
ic-agent = "0.40"
ic-ledger-types = "0.15.0"
ic-utils = "0.40"
log = "0.4"
pocket-ic = "9"
proc-macro2 = "1"
quote = "1"
reqwest = { version = "0.12" }
syn = "2"
tokio = { version = "1", features = ["full"] }
