<ul class="social-media-list">
    {%- if site.github_url -%}
    <li><a href="{{ site.github_url | escape }}">
        <svg class="svg-icon">
            <use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use>
        </svg>
        <span class="username">GitHub</span></a></li>
    {%- endif -%}
</ul>
